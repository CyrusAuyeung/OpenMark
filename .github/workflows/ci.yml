name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  checks:
    name: Lint and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $log = Get-ChildItem "$env:LOCALAPPDATA\npm-cache\_logs" -Filter "*.log" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($log) {
              $lines = Get-Content $log.FullName | Select-String -Pattern 'npm ERR!|error|ERR_|not found|unsupported|ELOCKVERIFY|certificate|ECONNRESET|ETIMEDOUT|ENOENT|EACCES' -CaseSensitive:$false | Select-Object -Last 20
              $message = (($lines | ForEach-Object { $_.Line.Trim() }) -join ' | ')
              if (-not $message) { $message = ((Get-Content $log.FullName -Tail 40) -join ' | ') }
              $message = $message.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
              Write-Host "::error title=npm ci failed::$message"
            }
            exit $exitCode
          }

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
