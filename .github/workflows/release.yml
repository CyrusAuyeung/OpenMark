name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          $npmOutput = npm ci --ignore-scripts --legacy-peer-deps --no-audit --no-fund 2>&1
          $exitCode = $LASTEXITCODE
          $npmOutput | ForEach-Object { Write-Host $_ }
          if ($exitCode -ne 0) {
            $lines = $npmOutput | Select-String -Pattern 'npm ERR!|error|ERR_|not found|unsupported|ELOCKVERIFY|certificate|ECONNRESET|ETIMEDOUT|ENOENT|EACCES' -CaseSensitive:$false | Select-Object -Last 20
            $message = (($lines | ForEach-Object { $_.Line.Trim() }) -join ' | ')
            if (-not $message) { $message = (($npmOutput | Select-Object -Last 40) -join ' | ') }
            $message = $message.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Host "::error title=npm ci failed::$message"
            exit $exitCode
          }

      - name: Lint
        run: npm run lint

      - name: Build renderer
        run: npm run build

      - name: Build Windows artifacts
        run: npx electron-builder --win --publish never

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmark-windows
          path: |
            release/*.exe
            release/*.blockmap

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.blockmap