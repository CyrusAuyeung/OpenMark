name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.4.0. Leave empty to build artifacts only.'
        required: false
        type: string
      draft:
        description: 'Create a draft GitHub release when publishing from a manual run.'
        required: false
        default: true
        type: boolean
      prerelease:
        description: 'Mark the GitHub release as a prerelease.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate manual release tag
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        shell: pwsh
        run: |
          if ('${{ inputs.tag }}' -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$') {
            throw 'Release tag must look like v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-<suffix>.'
          }

      - name: Lint
        run: npm run lint

      - name: Build renderer
        run: npm run build

      - name: Build Windows artifacts
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: npx electron-builder --win --publish never --config electron-builder.config.cjs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmark-windows-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  macos:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Build renderer
        run: npm run build

      - name: Build macOS artifacts
        run: npx electron-builder --mac --publish never --config electron-builder.config.cjs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmark-macos-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Build Linux release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Build renderer
        run: npm run build

      - name: Build Linux artifacts
        run: npx electron-builder --linux --publish never --config electron-builder.config.cjs

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmark-linux-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*
