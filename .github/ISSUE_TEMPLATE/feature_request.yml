name: Feature request
description: Suggest a focused improvement for OpenMark.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard, slow, or missing today?
      placeholder: When writing Markdown, I want...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other editors if relevant.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps OpenMark focused on local-first Markdown editing.
          required: true